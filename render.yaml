# Render Blueprint — https://dashboard.render.com/select-repo?type=blueprint
# Connect repo: shrutisgh/VirtualUi

services:
  # ── Backend API ─────────────────────────────────────────────
  - type: web
    name: virtual-ui-api
    runtime: node
    plan: free
    rootDir: virtual-ui-server
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CLIENT_URL
        fromService:
          type: web
          name: virtual-ui-web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (React / Vite) ─────────────────────────────────
  - type: web
    name: virtual-ui-web
    runtime: static
    plan: free
    rootDir: virtual-ui-client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: virtual-ui-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_FIREBASE_APIKEY
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
